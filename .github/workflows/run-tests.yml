name: run-tests

on:
  push:
    branches: [ main, development, v2 ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        # 8.4 es la versión del entorno de desarrollo real; 8.2/8.3 cubren el
        # contrato público del paquete ("php": "^8.2" en composer.json).
        php: [ 8.2, 8.3, 8.4 ]

    name: PHP${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      # La suite es Pest (no phpunit directo). Los tests que requieren el CSD
      # de pruebas del SAT se saltan solos cuando los archivos no existen.
      - name: Execute tests
        run: vendor/bin/pest --ci
