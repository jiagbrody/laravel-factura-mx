name: PHPStan

# Sin filtro de paths: "phpstan" es un check REQUERIDO por la protección de
# main, y un workflow con filtro nunca reporta en los PRs que no lo cumplen,
# dejándolos bloqueados esperando un check que jamás llegará.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run PHPStan
        run: ./vendor/bin/phpstan --error-format=github
